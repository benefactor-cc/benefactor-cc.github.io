name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: source-contract checks over the committed HTML. No browser, so
  # it fails in seconds on the cheap regressions (titles, nav, CNAME, links).
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Contract tests
        run: npm test

  # Browser E2E gate: Puppeteer + Playwright drive the built site with a real
  # Chrome. Both engines share the setup-chrome binary via CHROME_BIN, so we
  # install one browser, not two.
  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2

      # --ignore-scripts skips Puppeteer's own Chromium download; the tests use
      # the setup-chrome binary via the harness's CHROME_BIN lookup instead.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Puppeteer + Playwright E2E
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:browser
