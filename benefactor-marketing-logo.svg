  <text x="36" y="140" font-family="'Inter','Helvetica Neue','Arial',sans-serif" font-size="62" font-weight="800" fill="#1e3a5f" letter-spacing="-1">Benefactor</text>

  <!-- "Marketing" text -->
  <text x="36" y="210" font-family="'Inter','Helvetica Neue','Arial',sans-serif" font-size="62" font-weight="800" fill="#1e3a5f" letter-spacing="-1">Marketing</text>

