<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f1117">
    <title>Unsubscribe | Benefactor Marketing</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #f4f5f7;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; }
      header { border-bottom: 1px solid #2b303a; }
      header, main, footer { padding: 24px clamp(20px, 5vw, 64px); }
      header img { display: block; width: 168px; height: auto; }
      main { display: grid; align-content: center; min-height: calc(100vh - 180px); max-width: 760px; }
      h1 { margin: 0 0 16px; font-size: clamp(2rem, 5vw, 3.25rem); line-height: 1.1; }
      p { margin: 0 0 24px; color: #bac0ca; font-size: 1.05rem; line-height: 1.7; }
      a.button {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 6px;
        background: #e24b4b;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
      a.button:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
      footer { border-top: 1px solid #2b303a; color: #89919f; font-size: .9rem; }
    </style>
  </head>
  <body>
    <header><a href="/" aria-label="Benefactor Marketing home"><img src="/benefactor-wordmark.svg" alt="Benefactor Marketing"></a></header>
    <main>
      <h1>Stop Benefactor emails</h1>
      <p>Send the pre-addressed request below. Our reply processor marks your address as unsubscribed and blocks future outreach.</p>
      <a class="button" id="unsubscribe-link" href="mailto:hello@benefactor.cc?subject=Unsubscribe">Send unsubscribe request</a>
    </main>
    <footer>Benefactor Marketing, 120 East 82nd St, New York, NY 10028</footer>
    <script>
      const params = new URLSearchParams(window.location.search);
      const campaign = params.get("campaign") || "benefactor-outreach";
      const leadId = params.get("leadId") || "not-provided";
      const body = `Please unsubscribe this address from Benefactor outreach.\n\nCampaign: ${campaign}\nLead: ${leadId}`;
      document.getElementById("unsubscribe-link").href = `mailto:hello@benefactor.cc?subject=Unsubscribe&body=${encodeURIComponent(body)}`;
    </script>
  </body>
</html>
